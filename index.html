<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUCARACHAENTANG — Art Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap');

:root {
  --ink: #0a0a0a;
  --paper: #f0ede6;
  --roach: #3d2b1f;
  --accent: #c8ff00;
  --accent2: #ff4500;
  --dim: #2a2520;
  --muted: #7a6f65;
  --border: #d4cfc8;
  --mono: 'Space Mono', monospace;
  --display: 'Unbounded', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--mono); background: var(--ink); color: var(--paper); min-height:100vh; }

/* ── HEADER ── */
header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 24px 40px;
  border-bottom: 1px solid #1e1e1e;
}

.logo {
  font-family: var(--display);
  font-size: 12px; font-weight: 900;
  letter-spacing: 3px; color: var(--accent);
}

.header-sub { font-size: 10px; letter-spacing: 3px; color: var(--muted); }

/* ── MAIN GRID ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 0;
  min-height: calc(100vh - 73px);
}

/* ── LEFT: CANVAS AREA ── */
.canvas-area {
  padding: 40px;
  display: flex; flex-direction: column; gap: 24px;
  border-right: 1px solid #1e1e1e;
}

.view-tabs {
  display: flex; gap: 0;
}

.view-tab {
  font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
  padding: 8px 20px; cursor: pointer; border: 1px solid #1e1e1e;
  background: transparent; color: var(--muted); transition: all 0.15s;
}
.view-tab:first-child { border-right: none; }
.view-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

.canvas-wrap {
  position: relative;
  display: flex; justify-content: center;
}

#pfp-canvas, #banner-canvas { display: none; border: 1px solid #1e1e1e; }
#pfp-canvas.show, #banner-canvas.show { display: block; max-width: 100%; }

/* ── RARITY BADGE ── */
.rarity-row {
  display: flex; align-items: center; gap: 12px;
}

.rarity-badge {
  font-family: var(--display); font-size: 11px; font-weight: 700;
  letter-spacing: 2px; padding: 5px 14px;
}
.rarity-COMMON    { background: #2a2a2a; color: #888; }
.rarity-UNCOMMON  { background: #1a2a1a; color: #4ade80; }
.rarity-RARE      { background: #1a1a3a; color: #818cf8; }
.rarity-EPIC      { background: #2a1a3a; color: #c084fc; }
.rarity-LEGENDARY { background: #3a2500; color: var(--accent); }

.rarity-score { font-size: 10px; color: var(--muted); letter-spacing: 1px; }

/* ── TRAIT PILLS ── */
.traits-grid {
  display: flex; flex-wrap: wrap; gap: 8px;
}

.trait-pill {
  font-size: 10px; letter-spacing: 1px;
  padding: 4px 10px; border: 1px solid #1e1e1e;
  color: var(--muted);
}

.trait-pill b { color: var(--paper); display: block; font-size: 9px; margin-bottom: 2px; text-transform: uppercase; }

.trait-pill.rare-trait { border-color: var(--accent); color: var(--accent); }

/* ── ACTION ROW ── */
.action-row { display: flex; gap: 12px; flex-wrap: wrap; }

.btn {
  font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
  padding: 11px 22px; cursor: pointer; border: none; transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: #d4ff33; }
.btn-outline { background: transparent; border: 1px solid #333; color: var(--muted); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: transparent; border: 1px solid #333; color: var(--accent2); }
.btn-danger:hover { background: var(--accent2); color: #fff; }

/* ── RIGHT: CONTROLS ── */
.controls {
  padding: 32px 28px;
  display: flex; flex-direction: column; gap: 28px;
  overflow-y: auto;
}

.ctrl-section-title {
  font-size: 9px; letter-spacing: 4px; color: var(--muted);
  border-bottom: 1px solid #1e1e1e; padding-bottom: 10px; margin-bottom: 14px;
}

.ctrl-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.ctrl-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); }
.ctrl-val { font-size: 13px; color: var(--paper); font-weight: 700; }

input[type=range] {
  -webkit-appearance: none; width: 100%; height: 2px;
  background: #1e1e1e; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  background: var(--accent); border-radius: 0; cursor: pointer;
}

.swatch-row { display: flex; gap: 6px; flex-wrap: wrap; }
.swatch {
  width: 28px; height: 28px; cursor: pointer; border: 2px solid transparent;
  transition: border-color 0.15s;
}
.swatch.active { border-color: var(--accent); }

/* ── TOKEN GALLERY ── */
.gallery {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;
}

.gallery-item {
  cursor: pointer; border: 1px solid transparent; transition: border-color 0.15s;
  aspect-ratio: 1; overflow: hidden;
}
.gallery-item:hover { border-color: var(--accent); }
.gallery-item canvas { width: 100%; height: 100%; display: block; }

/* ── SUPPLY METER ── */
.supply-meter {
  background: #111; padding: 16px;
  border: 1px solid #1e1e1e;
}

.supply-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
.supply-label { font-size: 10px; color: var(--muted); }
.supply-val { font-size: 10px; color: var(--accent); font-weight: 700; }

.supply-track { height: 3px; background: #1e1e1e; margin-bottom: 4px; }
.supply-fill { height: 100%; background: var(--accent); transition: width 0.5s; }
.supply-note { font-size: 9px; color: var(--muted); text-align: right; }

@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
  header { padding: 16px 20px; }
  .canvas-area { padding: 20px; }
  .controls { padding: 20px; }
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">CUCARACHAENTANG</div>
  </div>
  <div class="header-sub">ONCHAIN SVG ART GENERATOR</div>
</header>

<div class="grid">

  <!-- LEFT -->
  <div class="canvas-area">
    <div class="view-tabs">
      <button class="view-tab active" onclick="setView('pfp')">PFP 1:1</button>
      <button class="view-tab" onclick="setView('banner')">BANNER 3:1</button>
    </div>

    <div class="canvas-wrap">
      <canvas id="pfp-canvas" class="show" width="480" height="480"></canvas>
      <canvas id="banner-canvas" width="960" height="320"></canvas>
    </div>

    <div class="rarity-row">
      <div class="rarity-badge" id="rarity-badge">COMMON</div>
      <div class="rarity-score" id="rarity-score">Rarity score: 0</div>
      <div class="rarity-score" id="token-id" style="margin-left:auto">TOKEN #—</div>
    </div>

    <div class="traits-grid" id="traits-grid"></div>

    <div class="action-row">
      <button class="btn btn-primary" onclick="randomize()">↻ RANDOMIZE</button>
      <button class="btn btn-outline" onclick="downloadPFP()">↓ PFP PNG</button>
      <button class="btn btn-outline" onclick="downloadBanner()">↓ BANNER PNG</button>
      <button class="btn btn-danger" onclick="mintThis()">MINT THIS ONE</button>
    </div>

    <!-- GALLERY -->
    <div class="ctrl-section-title" style="margin-top:8px">QUICK GALLERY — CLICK TO LOAD</div>
    <div class="gallery" id="gallery"></div>
  </div>

  <!-- RIGHT CONTROLS -->
  <div class="controls">

    <div>
      <div class="ctrl-section-title">SEED / TOKEN ID</div>
      <div class="ctrl-row">
        <div class="ctrl-label">TOKEN ID <span class="ctrl-val" id="ctrl-seed-val">1</span></div>
        <input type="range" id="ctrl-seed" min="1" max="6969" value="1" oninput="onSeedChange(this.value)">
      </div>
    </div>

    <div>
      <div class="ctrl-section-title">SUPPLY DIFFICULTY</div>
      <div class="supply-meter">
        <div class="supply-row">
          <span class="supply-label">MINTED</span>
          <span class="supply-val" id="sup-val">847 / 6969</span>
        </div>
        <div class="supply-track"><div class="supply-fill" id="sup-fill" style="width:12%"></div></div>
        <div class="supply-note" id="sup-note">GAME: 5 rounds · 3 lives</div>
      </div>
      <div class="ctrl-row" style="margin-top:12px">
        <div class="ctrl-label">SIMULATE MINT %</div>
        <input type="range" id="ctrl-supply" min="0" max="100" value="12" oninput="onSupplyChange(this.value)">
      </div>
    </div>

    <div>
      <div class="ctrl-section-title">BACKGROUND</div>
      <div class="swatch-row" id="bg-swatches"></div>
    </div>

    <div>
      <div class="ctrl-section-title">BODY COLOR</div>
      <div class="swatch-row" id="body-swatches"></div>
    </div>

    <div>
      <div class="ctrl-section-title">RARITY BREAKDOWN</div>
      <div id="rarity-breakdown" style="display:flex;flex-direction:column;gap:6px"></div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// TRAIT SYSTEM
// ═══════════════════════════════════════════════════════

const TRAITS = {
  background: {
    name: 'Background',
    options: [
      { name: 'Void',       color: '#080808', rarity: 0.20 },
      { name: 'Sewer',      color: '#1a2a1a', rarity: 0.18 },
      { name: 'Dirt',       color: '#2a1f14', rarity: 0.16 },
      { name: 'Rust',       color: '#2a1410', rarity: 0.14 },
      { name: 'Lab',        color: '#101a2a', rarity: 0.12 },
      { name: 'Neon Night', color: '#0d001a', rarity: 0.10 },
      { name: 'Gold',       color: '#2a1e00', rarity: 0.06 },
      { name: 'Glitch',     color: '#001a0d', rarity: 0.04 },
    ]
  },
  body: {
    name: 'Body',
    options: [
      { name: 'Brown',      color: '#5c3a1e', rarity: 0.25 },
      { name: 'Dark',       color: '#2a1810', rarity: 0.22 },
      { name: 'Albino',     color: '#d4b896', rarity: 0.15 },
      { name: 'Green',      color: '#2d4a1e', rarity: 0.14 },
      { name: 'Blue',       color: '#1e2d4a', rarity: 0.12 },
      { name: 'Red',        color: '#4a1e1e', rarity: 0.07 },
      { name: 'Gold',       color: '#8a6a00', rarity: 0.03 },
      { name: 'Chrome',     color: '#3a3a3a', rarity: 0.02 },
    ]
  },
  antenna: {
    name: 'Antenna',
    options: [
      { name: 'Straight',   rarity: 0.35 },
      { name: 'Curly',      rarity: 0.25 },
      { name: 'Broken',     rarity: 0.20 },
      { name: 'Long',       rarity: 0.12 },
      { name: 'Satellite',  rarity: 0.05 },
      { name: 'Crown',      rarity: 0.03 },
    ]
  },
  eyes: {
    name: 'Eyes',
    options: [
      { name: 'Beady',      rarity: 0.30 },
      { name: 'Big',        rarity: 0.25 },
      { name: 'Angry',      rarity: 0.18 },
      { name: 'Dead',       rarity: 0.12 },
      { name: 'Laser',      rarity: 0.08 },
      { name: 'Rainbow',    rarity: 0.05 },
      { name: 'Void',       rarity: 0.02 },
    ]
  },
  legs: {
    name: 'Legs',
    options: [
      { name: '6 Legs',     count: 6, rarity: 0.45 },
      { name: '4 Legs',     count: 4, rarity: 0.25 },
      { name: '8 Legs',     count: 8, rarity: 0.20 },
      { name: '2 Legs',     count: 2, rarity: 0.07 },
      { name: '12 Legs',    count: 12, rarity: 0.03 },
    ]
  },
  shell: {
    name: 'Shell',
    options: [
      { name: 'Smooth',     rarity: 0.30 },
      { name: 'Ridged',     rarity: 0.25 },
      { name: 'Spotted',    rarity: 0.20 },
      { name: 'Cracked',    rarity: 0.12 },
      { name: 'Glowing',    rarity: 0.08 },
      { name: 'Crystal',    rarity: 0.05 },
    ]
  },
  accessory: {
    name: 'Accessory',
    options: [
      { name: 'None',       rarity: 0.55 },
      { name: 'Cigarette',  rarity: 0.15 },
      { name: 'Chain',      rarity: 0.12 },
      { name: 'Monocle',    rarity: 0.08 },
      { name: 'Top Hat',    rarity: 0.05 },
      { name: 'Wings',      rarity: 0.03 },
      { name: 'Halo',       rarity: 0.02 },
    ]
  }
};

const RARE_TRAITS = ['Satellite','Crown','Laser','Rainbow','Void','Crystal','Glowing','Wings','Halo','Gold','Chrome'];

// ═══════════════════════════════════════════════════════
// DETERMINISTIC RNG from seed
// ═══════════════════════════════════════════════════════
function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function pickFromWeighted(options, rand) {
  const r = rand();
  let cum = 0;
  for (const o of options) {
    cum += o.rarity;
    if (r <= cum) return o;
  }
  return options[options.length - 1];
}

function traitsFromSeed(seed) {
  const rand = seededRand(seed * 6969 + 42);
  return {
    background: pickFromWeighted(TRAITS.background.options, rand),
    body:        pickFromWeighted(TRAITS.body.options, rand),
    antenna:     pickFromWeighted(TRAITS.antenna.options, rand),
    eyes:        pickFromWeighted(TRAITS.eyes.options, rand),
    legs:        pickFromWeighted(TRAITS.legs.options, rand),
    shell:       pickFromWeighted(TRAITS.shell.options, rand),
    accessory:   pickFromWeighted(TRAITS.accessory.options, rand),
  };
}

function rarityScore(t) {
  return [t.background, t.body, t.antenna, t.eyes, t.legs, t.shell, t.accessory]
    .reduce((s, x) => s + (1 / x.rarity), 0);
}

function rarityTier(score) {
  if (score > 200) return 'LEGENDARY';
  if (score > 120) return 'EPIC';
  if (score > 70)  return 'RARE';
  if (score > 40)  return 'UNCOMMON';
  return 'COMMON';
}

// ═══════════════════════════════════════════════════════
// COCKROACH SVG RENDERER → Canvas
// ═══════════════════════════════════════════════════════
function drawCockroach(ctx, W, H, traits, forBanner = false) {
  const cx = W / 2, cy = H / 2;
  const scale = Math.min(W, H) / 480;
  const S = n => n * scale;

  ctx.save();

  // ── BACKGROUND ──
  ctx.fillStyle = traits.background.color;
  ctx.fillRect(0, 0, W, H);

  // Background texture
  const bgName = traits.background.name;
  if (bgName === 'Neon Night') {
    // Grid lines
    ctx.strokeStyle = 'rgba(200,255,0,0.06)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += S(40)) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y < H; y += S(40)) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  } else if (bgName === 'Sewer') {
    ctx.fillStyle = 'rgba(0,80,0,0.08)';
    for (let i = 0; i < 20; i++) {
      const rx = (seededRand(i*77+1)() * W), ry = (seededRand(i*77+2)() * H);
      ctx.fillRect(rx, ry, S(2), S(20 + seededRand(i)() * 60));
    }
  } else if (bgName === 'Glitch') {
    const glitchRand = seededRand(traits.body.name.length * 31);
    for (let i = 0; i < 8; i++) {
      ctx.fillStyle = `rgba(${Math.floor(glitchRand()*255)},255,${Math.floor(glitchRand()*100)},0.07)`;
      ctx.fillRect(0, glitchRand() * H, W, S(4 + glitchRand() * 20));
    }
  }

  // ── SHADOW ──
  ctx.beginPath();
  ctx.ellipse(cx, cy + S(155), S(95), S(18), 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();

  const bodyColor = traits.body.color;
  const darkBody  = shadeColor(bodyColor, -0.35);
  const lightBody = shadeColor(bodyColor, 0.25);
  const shellName = traits.shell.name;
  const eyeName   = traits.eyes.name;
  const antName   = traits.antenna.name;
  const legCount  = traits.legs.count;
  const acc       = traits.accessory.name;

  // ── LEGS ──
  const legsPerSide = legCount / 2;
  const legSpread   = S(52);
  const legBaseY    = cy + S(20);
  for (let side = -1; side <= 1; side += 2) {
    for (let i = 0; i < legsPerSide; i++) {
      const t = (i / (legsPerSide - 0.5)) - 0.5;
      const lx = cx + side * S(58);
      const ly = legBaseY + t * S(80);
      const ex = cx + side * (S(100) + Math.abs(t) * S(20));
      const ey = ly + S(35);
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.quadraticCurveTo(lx + side * S(20), ly + S(10), ex, ey);
      ctx.strokeStyle = darkBody;
      ctx.lineWidth   = S(4);
      ctx.lineCap     = 'round';
      ctx.stroke();
      // foot
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.lineTo(ex + side * S(12), ey + S(6));
      ctx.strokeStyle = darkBody;
      ctx.lineWidth   = S(3);
      ctx.stroke();
    }
  }

  // ── BODY (abdomen) ──
  ctx.save();
  const bodyGrad = ctx.createRadialGradient(cx - S(15), cy + S(30), S(10), cx, cy + S(60), S(110));
  bodyGrad.addColorStop(0, lightBody);
  bodyGrad.addColorStop(0.6, bodyColor);
  bodyGrad.addColorStop(1, darkBody);
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(cx, cy + S(60), S(58), S(95), 0, 0, Math.PI * 2);
  ctx.fill();

  // Shell segments
  ctx.strokeStyle = darkBody;
  ctx.lineWidth   = S(1.5);
  if (shellName === 'Ridged') {
    for (let i = 0; i < 5; i++) {
      const sy = cy - S(20) + i * S(30);
      ctx.beginPath();
      ctx.ellipse(cx, sy, S(45 - i*2), S(8), 0, 0, Math.PI);
      ctx.stroke();
    }
  } else if (shellName === 'Spotted') {
    const sr = seededRand(traits.shell.name.length * 13 + traits.body.color.length);
    for (let i = 0; i < 8; i++) {
      ctx.beginPath();
      ctx.arc(cx + (sr()-0.5)*S(80), cy + (sr()-0.5)*S(120) + S(60), S(5+sr()*10), 0, Math.PI*2);
      ctx.fillStyle = darkBody;
      ctx.fill();
    }
  } else if (shellName === 'Cracked') {
    ctx.strokeStyle = shadeColor(bodyColor, -0.5);
    ctx.lineWidth   = S(1);
    const cr = seededRand(77);
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.moveTo(cx + (cr()-0.5)*S(60), cy + cr()*S(80));
      ctx.lineTo(cx + (cr()-0.5)*S(80), cy + S(40) + cr()*S(60));
      ctx.stroke();
    }
  } else if (shellName === 'Glowing') {
    ctx.shadowBlur  = S(30);
    ctx.shadowColor = lightBody;
    ctx.strokeStyle = lightBody;
    ctx.lineWidth   = S(1);
    ctx.beginPath();
    ctx.ellipse(cx, cy + S(60), S(60), S(97), 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur  = 0;
  } else if (shellName === 'Crystal') {
    ctx.strokeStyle = 'rgba(200,240,255,0.4)';
    ctx.lineWidth   = S(1);
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy + S(60));
      ctx.lineTo(cx + Math.cos(a)*S(55), cy + S(60) + Math.sin(a)*S(90));
      ctx.stroke();
    }
  }
  ctx.restore();

  // ── HEAD ──
  const headGrad = ctx.createRadialGradient(cx - S(10), cy - S(90), S(5), cx, cy - S(75), S(45));
  headGrad.addColorStop(0, lightBody);
  headGrad.addColorStop(1, darkBody);
  ctx.fillStyle = headGrad;
  ctx.beginPath();
  ctx.ellipse(cx, cy - S(75), S(38), S(46), 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = darkBody;
  ctx.lineWidth   = S(1.5);
  ctx.stroke();

  // ── EYES ──
  const eyeY = cy - S(82);
  const eyeOffsets = [[-S(14), 0], [S(14), 0]];
  for (const [ex, ey] of eyeOffsets) {
    if (eyeName === 'Beady') {
      ctx.beginPath(); ctx.arc(cx+ex, eyeY+ey, S(6), 0, Math.PI*2);
      ctx.fillStyle = '#111'; ctx.fill();
      ctx.beginPath(); ctx.arc(cx+ex+S(2), eyeY+ey-S(2), S(2), 0, Math.PI*2);
      ctx.fillStyle = '#fff'; ctx.fill();
    } else if (eyeName === 'Big') {
      ctx.beginPath(); ctx.arc(cx+ex, eyeY+ey, S(10), 0, Math.PI*2);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.beginPath(); ctx.arc(cx+ex, eyeY+ey, S(6), 0, Math.PI*2);
      ctx.fillStyle = '#111'; ctx.fill();
      ctx.beginPath(); ctx.arc(cx+ex+S(2), eyeY+ey-S(3), S(2), 0, Math.PI*2);
      ctx.fillStyle = '#fff'; ctx.fill();
    } else if (eyeName === 'Angry') {
      ctx.beginPath(); ctx.arc(cx+ex, eyeY+ey, S(7), 0, Math.PI*2);
      ctx.fillStyle = '#cc2200'; ctx.fill();
      // angry brow
      ctx.beginPath(); ctx.moveTo(cx+ex-S(8), eyeY+ey-S(10));
      ctx.lineTo(cx+ex+S(8), eyeY+ey-S(6));
      ctx.strokeStyle = darkBody; ctx.lineWidth = S(3); ctx.stroke();
    } else if (eyeName === 'Dead') {
      ctx.strokeStyle = '#888'; ctx.lineWidth = S(2);
      ctx.beginPath(); ctx.moveTo(cx+ex-S(6), eyeY+ey-S(6)); ctx.lineTo(cx+ex+S(6), eyeY+ey+S(6)); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+ex+S(6), eyeY+ey-S(6)); ctx.lineTo(cx+ex-S(6), eyeY+ey+S(6)); ctx.stroke();
    } else if (eyeName === 'Laser') {
      ctx.beginPath(); ctx.arc(cx+ex, eyeY+ey, S(7), 0, Math.PI*2);
      ctx.fillStyle = '#ff4400'; ctx.fill();
      ctx.shadowBlur = S(20); ctx.shadowColor = '#ff4400';
      ctx.beginPath(); ctx.moveTo(cx+ex, eyeY+ey); ctx.lineTo(cx+ex + (ex>0?S(60):S(-60)), eyeY+ey);
      ctx.strokeStyle = '#ff4400'; ctx.lineWidth = S(2); ctx.stroke();
      ctx.shadowBlur = 0;
    } else if (eyeName === 'Rainbow') {
      const rgrad = ctx.createRadialGradient(cx+ex, eyeY+ey, 0, cx+ex, eyeY+ey, S(10));
      rgrad.addColorStop(0, '#ff0080');
      rgrad.addColorStop(0.33, '#00ffff');
      rgrad.addColorStop(0.66, '#ffff00');
      rgrad.addColorStop(1, '#ff0080');
      ctx.beginPath(); ctx.arc(cx+ex, eyeY+ey, S(10), 0, Math.PI*2);
      ctx.fillStyle = rgrad; ctx.fill();
    } else if (eyeName === 'Void') {
      ctx.beginPath(); ctx.arc(cx+ex, eyeY+ey, S(9), 0, Math.PI*2);
      ctx.fillStyle = '#000';
      ctx.shadowBlur = S(15); ctx.shadowColor = '#7c3aed';
      ctx.fill(); ctx.shadowBlur = 0;
    }
  }

  // ── ANTENNAE ──
  const antBaseY = cy - S(120);
  for (const side of [-1, 1]) {
    const ax = cx + side * S(18);
    if (antName === 'Straight') {
      ctx.beginPath(); ctx.moveTo(ax, antBaseY);
      ctx.lineTo(ax + side*S(12), antBaseY - S(55));
      ctx.strokeStyle = darkBody; ctx.lineWidth = S(2); ctx.stroke();
      ctx.beginPath(); ctx.arc(ax + side*S(12), antBaseY - S(55), S(3), 0, Math.PI*2);
      ctx.fillStyle = bodyColor; ctx.fill();
    } else if (antName === 'Curly') {
      ctx.beginPath(); ctx.moveTo(ax, antBaseY);
      ctx.bezierCurveTo(ax+side*S(30), antBaseY-S(20), ax-side*S(20), antBaseY-S(50), ax+side*S(10), antBaseY-S(65));
      ctx.strokeStyle = darkBody; ctx.lineWidth = S(2); ctx.lineCap='round'; ctx.stroke();
    } else if (antName === 'Broken') {
      ctx.beginPath(); ctx.moveTo(ax, antBaseY); ctx.lineTo(ax+side*S(8), antBaseY-S(25));
      ctx.lineTo(ax-side*S(5), antBaseY-S(45));
      ctx.strokeStyle = darkBody; ctx.lineWidth = S(2); ctx.stroke();
    } else if (antName === 'Long') {
      ctx.beginPath(); ctx.moveTo(ax, antBaseY);
      ctx.lineTo(ax+side*S(20), antBaseY - S(90));
      ctx.strokeStyle = darkBody; ctx.lineWidth = S(1.5); ctx.stroke();
    } else if (antName === 'Satellite') {
      ctx.beginPath(); ctx.moveTo(ax, antBaseY); ctx.lineTo(ax, antBaseY-S(50));
      ctx.strokeStyle = '#888'; ctx.lineWidth = S(1.5); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ax-S(14), antBaseY-S(60)); ctx.lineTo(ax+S(14), antBaseY-S(40));
      ctx.strokeStyle = '#aaa'; ctx.lineWidth = S(2); ctx.stroke();
      ctx.beginPath(); ctx.arc(ax, antBaseY-S(50), S(3), 0, Math.PI*2);
      ctx.fillStyle = '#c8ff00'; ctx.fill();
    } else if (antName === 'Crown') {
      // Crown instead of antennae
      if (side === -1) {
        const crownY = antBaseY - S(10);
        ctx.fillStyle = '#ffd700';
        ctx.shadowBlur = S(12); ctx.shadowColor = '#ffd700';
        const points = [
          [cx-S(22), crownY], [cx-S(18), crownY-S(30)], [cx-S(8), crownY-S(15)],
          [cx, crownY-S(35)], [cx+S(8), crownY-S(15)], [cx+S(18), crownY-S(30)],
          [cx+S(22), crownY],
        ];
        ctx.beginPath(); ctx.moveTo(...points[0]);
        for (const p of points.slice(1)) ctx.lineTo(...p);
        ctx.closePath(); ctx.fill();
        ctx.shadowBlur = 0;
        break;
      }
    }
  }

  // ── ACCESSORIES ──
  if (acc === 'Cigarette') {
    const cigX = cx + S(38), cigY = cy - S(58);
    ctx.beginPath(); ctx.moveTo(cigX, cigY); ctx.lineTo(cigX + S(28), cigY - S(5));
    ctx.strokeStyle = '#f5f5dc'; ctx.lineWidth = S(4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cigX + S(28), cigY - S(5)); ctx.lineTo(cigX + S(32), cigY - S(6));
    ctx.strokeStyle = '#ff6600'; ctx.lineWidth = S(4); ctx.stroke();
    // Smoke
    ctx.strokeStyle = 'rgba(200,200,200,0.3)'; ctx.lineWidth = S(2);
    ctx.beginPath();
    ctx.moveTo(cigX + S(32), cigY - S(8));
    ctx.bezierCurveTo(cigX + S(28), cigY - S(28), cigX + S(40), cigY - S(38), cigX + S(35), cigY - S(55));
    ctx.stroke();
  } else if (acc === 'Chain') {
    ctx.strokeStyle = '#c0a000'; ctx.lineWidth = S(3);
    ctx.beginPath();
    ctx.arc(cx, cy - S(30), S(35), 0.3, Math.PI - 0.3);
    ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy - S(10), S(10), 0, Math.PI*2);
    ctx.strokeStyle = '#c0a000'; ctx.lineWidth = S(2.5); ctx.stroke();
    ctx.fillStyle = '#ffd700'; ctx.font = `bold ${S(10)}px monospace`;
    ctx.textAlign = 'center'; ctx.fillText('₿', cx, cy - S(5));
  } else if (acc === 'Monocle') {
    ctx.beginPath(); ctx.arc(cx + S(14), cy - S(82), S(13), 0, Math.PI*2);
    ctx.strokeStyle = '#c0a000'; ctx.lineWidth = S(2.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + S(27), cy - S(75)); ctx.lineTo(cx + S(36), cy - S(68));
    ctx.stroke();
  } else if (acc === 'Top Hat') {
    const hx = cx, hy = cy - S(122);
    ctx.fillStyle = '#111';
    ctx.fillRect(hx - S(30), hy - S(50), S(60), S(50));
    ctx.fillRect(hx - S(42), hy, S(84), S(10));
    ctx.strokeStyle = '#444'; ctx.lineWidth = S(1);
    ctx.strokeRect(hx - S(30), hy - S(50), S(60), S(50));
    ctx.strokeRect(hx - S(42), hy, S(84), S(10));
    // hat band
    ctx.fillStyle = '#c8ff00';
    ctx.fillRect(hx - S(30), hy - S(14), S(60), S(6));
  } else if (acc === 'Wings') {
    ctx.save();
    for (const side of [-1, 1]) {
      const wgrad = ctx.createLinearGradient(cx, cy, cx + side * S(120), cy - S(60));
      wgrad.addColorStop(0, 'rgba(200,255,100,0.4)');
      wgrad.addColorStop(1, 'rgba(200,255,100,0.05)');
      ctx.fillStyle = wgrad;
      ctx.beginPath();
      ctx.moveTo(cx + side * S(55), cy);
      ctx.bezierCurveTo(
        cx + side * S(90), cy - S(100),
        cx + side * S(130), cy - S(80),
        cx + side * S(120), cy - S(20)
      );
      ctx.bezierCurveTo(cx + side * S(100), cy + S(20), cx + side * S(55), cy + S(10), cx + side * S(55), cy);
      ctx.fill();
      ctx.strokeStyle = 'rgba(200,255,100,0.3)'; ctx.lineWidth = S(1);
      ctx.stroke();
    }
    ctx.restore();
  } else if (acc === 'Halo') {
    ctx.beginPath();
    ctx.ellipse(cx, cy - S(140), S(35), S(10), 0, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffd700';
    ctx.shadowBlur  = S(20); ctx.shadowColor = '#ffd700';
    ctx.lineWidth   = S(4); ctx.stroke();
    ctx.shadowBlur  = 0;
  }

  ctx.restore();
}

function shadeColor(hex, pct) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, Math.max(0, (n >> 16) + Math.round(255 * pct)));
  const g = Math.min(255, Math.max(0, ((n >> 8) & 0xff) + Math.round(255 * pct)));
  const b = Math.min(255, Math.max(0, (n & 0xff) + Math.round(255 * pct)));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════════════
// BANNER RENDERER
// ═══════════════════════════════════════════════════════
function drawBanner(ctx, W, H, traits, tokenId) {
  // Draw background
  ctx.fillStyle = traits.background.color;
  ctx.fillRect(0, 0, W, H);

  // Dark overlay on right side
  const grad = ctx.createLinearGradient(0, 0, W, 0);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(0.6, 'rgba(0,0,0,0.3)');
  grad.addColorStop(1, 'rgba(0,0,0,0.8)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Draw cockroach on left
  const roachSize = H * 0.9;
  const offCtx = document.createElement('canvas');
  offCtx.width = roachSize; offCtx.height = roachSize;
  drawCockroach(offCtx.getContext('2d'), roachSize, roachSize, traits);
  ctx.drawImage(offCtx, H * 0.05, H * 0.05);

  // Text on right
  ctx.fillStyle = '#c8ff00';
  ctx.font = `900 ${H * 0.12}px Unbounded, sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText('CUCARACHAENTANG', W * 0.38, H * 0.38);

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `${H * 0.055}px Space Mono, monospace`;
  ctx.fillText('6969 ONCHAIN COCKROACHES', W * 0.38, H * 0.55);
  ctx.fillText('ETHEREUM · ERC-721', W * 0.38, H * 0.68);

  const tier = rarityTier(rarityScore(traits));
  const tierColors = { COMMON:'#888', UNCOMMON:'#4ade80', RARE:'#818cf8', EPIC:'#c084fc', LEGENDARY:'#c8ff00' };
  ctx.fillStyle = tierColors[tier];
  ctx.font = `bold ${H * 0.07}px Unbounded, sans-serif`;
  ctx.fillText(`#${tokenId} · ${tier}`, W * 0.38, H * 0.84);
}

// ═══════════════════════════════════════════════════════
// STATE + UI
// ═══════════════════════════════════════════════════════
let currentSeed = 1;
let currentView = 'pfp';

function render(seed) {
  currentSeed = seed;
  const traits = traitsFromSeed(seed);
  const pfp    = document.getElementById('pfp-canvas');
  const banner = document.getElementById('banner-canvas');
  drawCockroach(pfp.getContext('2d'), pfp.width, pfp.height, traits);
  drawBanner(banner.getContext('2d'), banner.width, banner.height, traits, seed);

  // Rarity
  const score = rarityScore(traits);
  const tier  = rarityTier(score);
  const badge = document.getElementById('rarity-badge');
  badge.textContent  = tier;
  badge.className    = `rarity-badge rarity-${tier}`;
  document.getElementById('rarity-score').textContent = `Rarity score: ${Math.round(score)}`;
  document.getElementById('token-id').textContent     = `TOKEN #${seed}`;

  // Trait pills
  const tg = document.getElementById('traits-grid');
  tg.innerHTML = '';
  const traitList = [
    ['Background', traits.background.name],
    ['Body',       traits.body.name],
    ['Antenna',    traits.antenna.name],
    ['Eyes',       traits.eyes.name],
    ['Legs',       traits.legs.name],
    ['Shell',      traits.shell.name],
    ['Accessory',  traits.accessory.name],
  ];
  for (const [label, val] of traitList) {
    const isRare = RARE_TRAITS.includes(val);
    const div = document.createElement('div');
    div.className = 'trait-pill' + (isRare ? ' rare-trait' : '');
    div.innerHTML = `<b>${label}</b>${val}`;
    tg.appendChild(div);
  }

  // Rarity breakdown
  updateRarityBreakdown(traits);
}

function updateRarityBreakdown(traits) {
  const el = document.getElementById('rarity-breakdown');
  const items = [
    { label: 'Background', r: traits.background.rarity },
    { label: 'Body',       r: traits.body.rarity },
    { label: 'Antenna',    r: traits.antenna.rarity },
    { label: 'Eyes',       r: traits.eyes.rarity },
    { label: 'Legs',       r: traits.legs.rarity },
    { label: 'Shell',      r: traits.shell.rarity },
    { label: 'Accessory',  r: traits.accessory.rarity },
  ];
  el.innerHTML = items.map(({label, r}) => `
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
      <span style="font-size:9px;letter-spacing:1px;color:var(--muted);width:80px">${label}</span>
      <div style="flex:1;height:2px;background:#1e1e1e">
        <div style="width:${r*100}%;height:100%;background:${r<0.1?'#c8ff00':r<0.2?'#818cf8':'#333'}"></div>
      </div>
      <span style="font-size:9px;color:${r<0.05?'#c8ff00':r<0.1?'#818cf8':'var(--muted)'};">${(r*100).toFixed(0)}%</span>
    </div>
  `).join('');
}

function setView(v) {
  currentView = v;
  document.getElementById('pfp-canvas').className    = v === 'pfp'    ? 'show' : '';
  document.getElementById('banner-canvas').className = v === 'banner' ? 'show' : '';
  document.querySelectorAll('.view-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && v==='pfp') || (i===1 && v==='banner'));
  });
}

function randomize() {
  const seed = 1 + Math.floor(Math.random() * 6969);
  document.getElementById('ctrl-seed').value = seed;
  document.getElementById('ctrl-seed-val').textContent = seed;
  render(seed);
}

function onSeedChange(v) {
  document.getElementById('ctrl-seed-val').textContent = v;
  render(parseInt(v));
}

function onSupplyChange(v) {
  const pct = parseInt(v);
  const minted = Math.round(pct / 100 * 6969);
  document.getElementById('sup-val').textContent  = `${minted.toLocaleString()} / 6969`;
  document.getElementById('sup-fill').style.width = pct + '%';
  let rounds, lives, speed, note;
  if (pct < 25)       { rounds=5; lives=3; speed=600;  note='EASY — early minters win'; }
  else if (pct < 50)  { rounds=6; lives=2; speed=450;  note='MEDIUM — getting harder'; }
  else if (pct < 75)  { rounds=7; lives=2; speed=320;  note='HARD — halfway pain'; }
  else if (pct < 90)  { rounds=8; lives=1; speed=220;  note='BRUTAL — 1 life'; }
  else                { rounds=9; lives=1; speed=150;  note='NO MERCY — final stretch'; }
  document.getElementById('sup-note').textContent = `GAME: ${rounds} rounds · ${lives} ${lives===1?'life':'lives'} · ${speed}ms flash`;
}

function downloadPFP() {
  const a = document.createElement('a');
  a.download = `cucarachaentang-${currentSeed}-pfp.png`;
  a.href = document.getElementById('pfp-canvas').toDataURL();
  a.click();
}

function downloadBanner() {
  const a = document.createElement('a');
  a.download = `cucarachaentang-banner.png`;
  a.href = document.getElementById('banner-canvas').toDataURL();
  a.click();
}

function mintThis() {
  alert(`Token #${currentSeed} locked in.\nTake this seed to the contract build.`);
}

// ── SWATCHES ──
function buildSwatches() {
  const bgEl   = document.getElementById('bg-swatches');
  const bodyEl = document.getElementById('body-swatches');

  TRAITS.background.options.forEach((o, i) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (i===0?' active':'');
    s.style.background = o.color;
    s.title = o.name;
    s.onclick = () => {
      const t = traitsFromSeed(currentSeed);
      t.background = o;
      const pfp = document.getElementById('pfp-canvas');
      drawCockroach(pfp.getContext('2d'), pfp.width, pfp.height, t);
      bgEl.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
    };
    bgEl.appendChild(s);
  });

  TRAITS.body.options.forEach((o, i) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (i===0?' active':'');
    s.style.background = o.color;
    s.title = o.name;
    s.onclick = () => {
      const t = traitsFromSeed(currentSeed);
      t.body = o;
      const pfp = document.getElementById('pfp-canvas');
      drawCockroach(pfp.getContext('2d'), pfp.width, pfp.height, t);
      bodyEl.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
    };
    bodyEl.appendChild(s);
  });
}

// ── GALLERY ──
function buildGallery() {
  const el = document.getElementById('gallery');
  const seeds = [1, 42, 137, 420, 777, 1337, 2048, 3333, 4200, 5555, 6000, 6420, 6699, 6900, 6969];
  for (const seed of seeds) {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    const c = document.createElement('canvas');
    c.width = 80; c.height = 80;
    const t = traitsFromSeed(seed);
    drawCockroach(c.getContext('2d'), 80, 80, t);
    item.appendChild(c);
    item.onclick = () => {
      document.getElementById('ctrl-seed').value = seed;
      document.getElementById('ctrl-seed-val').textContent = seed;
      render(seed);
    };
    el.appendChild(item);
  }
}

// ── INIT ──
buildSwatches();
buildGallery();
render(1);
</script>
