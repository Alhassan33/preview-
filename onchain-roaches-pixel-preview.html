<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONCHAIN ROACHES — Pixel Preview</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap');

:root {
  --ink:     #0a0a0a;
  --accent:  #c8ff00;
  --accent2: #ff4500;
  --muted:   #7a6f65;
  --paper:   #f0ede6;
  --border:  #1e1e1e;
  --mono:    'Space Mono', monospace;
  --display: 'Unbounded', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--mono); background: var(--ink); color: var(--paper); min-height:100vh; }

header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 36px; border-bottom: 1px solid var(--border);
}
.logo { font-family: var(--display); font-size: 11px; font-weight: 900; letter-spacing: 3px; color: var(--accent); }
.header-sub { font-size: 10px; letter-spacing: 3px; color: var(--muted); }

.grid { display: grid; grid-template-columns: 1fr 340px; min-height: calc(100vh - 61px); }

.canvas-area { padding: 32px 36px; display: flex; flex-direction: column; gap: 20px; border-right: 1px solid var(--border); }

.view-tabs { display: flex; gap: 0; }
.view-tab {
  font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
  padding: 8px 18px; cursor: pointer; border: 1px solid var(--border);
  background: transparent; color: var(--muted); transition: all 0.15s;
}
.view-tab:first-child { border-right: none; }
.view-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

.canvas-wrap { display: flex; justify-content: center; align-items: flex-start; }

#pfp-canvas, #banner-canvas {
  display: none; border: 1px solid var(--border);
  image-rendering: pixelated; image-rendering: crisp-edges;
}
#pfp-canvas.show, #banner-canvas.show { display: block; }

.rarity-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.rarity-badge { font-family: var(--display); font-size: 10px; font-weight: 700; letter-spacing: 2px; padding: 4px 12px; }
.rarity-COMMON    { background: #2a2a2a; color: #888; }
.rarity-UNCOMMON  { background: #1a2a1a; color: #4ade80; }
.rarity-RARE      { background: #1a1a3a; color: #818cf8; }
.rarity-EPIC      { background: #2a1a3a; color: #c084fc; }
.rarity-LEGENDARY { background: #3a2500; color: var(--accent); }
.rarity-score { font-size: 10px; color: var(--muted); letter-spacing: 1px; }

.traits-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.trait-pill { font-size: 10px; letter-spacing: 1px; padding: 4px 10px; border: 1px solid var(--border); color: var(--muted); }
.trait-pill b { color: var(--paper); display: block; font-size: 9px; margin-bottom: 2px; text-transform: uppercase; }
.trait-pill.rare-trait { border-color: var(--accent); color: var(--accent); }

.action-row { display: flex; gap: 10px; flex-wrap: wrap; }
.btn { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; padding: 10px 20px; cursor: pointer; border: none; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: #d4ff33; }
.btn-outline { background: transparent; border: 1px solid #333; color: var(--muted); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }

.gallery-label { font-size: 9px; letter-spacing: 4px; color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(56px, 1fr)); gap: 4px; }
.gallery-item { cursor: pointer; border: 1px solid transparent; transition: border-color 0.15s; position: relative; }
.gallery-item:hover { border-color: var(--accent); }
.gallery-item canvas { display: block; width: 100%; aspect-ratio: 1; image-rendering: pixelated; image-rendering: crisp-edges; }
.gallery-item .gnum { position: absolute; bottom: 2px; right: 3px; font-size: 8px; color: rgba(200,255,0,0.5); line-height: 1; }

.controls { padding: 28px 24px; display: flex; flex-direction: column; gap: 24px; overflow-y: auto; }
.ctrl-section-title { font-size: 9px; letter-spacing: 4px; color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px; }
.ctrl-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.ctrl-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); }
.ctrl-val { font-size: 13px; color: var(--paper); font-weight: 700; }

input[type=range] { -webkit-appearance: none; width: 100%; height: 2px; background: #1e1e1e; outline: none; cursor: pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent); border-radius: 0; cursor: pointer; }

.swatch-row { display: flex; gap: 5px; flex-wrap: wrap; }
.swatch { width: 26px; height: 26px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
.swatch.active { border-color: var(--accent); }

.supply-meter { background: #111; padding: 14px; border: 1px solid var(--border); }
.supply-row { display: flex; justify-content: space-between; margin-bottom: 7px; }
.supply-label { font-size: 10px; color: var(--muted); }
.supply-val   { font-size: 10px; color: var(--accent); font-weight: 700; }
.supply-track { height: 2px; background: #1e1e1e; margin-bottom: 4px; }
.supply-fill  { height: 100%; background: var(--accent); transition: width 0.4s; }
.supply-note  { font-size: 9px; color: var(--muted); text-align: right; }

#rarity-breakdown { display: flex; flex-direction: column; gap: 6px; }

@media (max-width: 860px) {
  .grid { grid-template-columns: 1fr; }
  header { padding: 14px 20px; }
  .canvas-area { padding: 20px; }
  .controls { padding: 20px; border-top: 1px solid var(--border); }
}
</style>
</head>
<body>

<header>
  <div class="logo">ONCHAIN ROACHES</div>
  <div class="header-sub">24×24 PIXEL ART · ONCHAIN SVG</div>
</header>

<div class="grid">
  <div class="canvas-area">
    <div class="view-tabs">
      <button class="view-tab active" onclick="setView('pfp')">PFP 1:1</button>
      <button class="view-tab"        onclick="setView('banner')">BANNER 3:1</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="pfp-canvas"    class="show" width="480" height="480" style="max-width:480px;width:100%"></canvas>
      <canvas id="banner-canvas"             width="960" height="320" style="max-width:960px;width:100%"></canvas>
    </div>
    <div class="rarity-row">
      <div class="rarity-badge" id="rarity-badge">COMMON</div>
      <div class="rarity-score" id="rarity-score">—</div>
      <div class="rarity-score" id="token-id" style="margin-left:auto">TOKEN #—</div>
    </div>
    <div class="traits-grid" id="traits-grid"></div>
    <div class="action-row">
      <button class="btn btn-primary" onclick="randomize()">↻ RANDOMIZE</button>
      <button class="btn btn-outline" onclick="downloadPFP()">↓ PFP PNG</button>
      <button class="btn btn-outline" onclick="downloadBanner()">↓ BANNER PNG</button>
    </div>
    <div class="gallery-label">QUICK GALLERY — CLICK TO LOAD</div>
    <div class="gallery" id="gallery"></div>
  </div>

  <div class="controls">
    <div>
      <div class="ctrl-section-title">SEED / TOKEN ID</div>
      <div class="ctrl-row">
        <div class="ctrl-label">TOKEN <span class="ctrl-val" id="ctrl-seed-val">1</span></div>
        <input type="range" id="ctrl-seed" min="1" max="6969" value="1" oninput="onSeedChange(this.value)">
      </div>
    </div>
    <div>
      <div class="ctrl-section-title">SUPPLY DIFFICULTY</div>
      <div class="supply-meter">
        <div class="supply-row">
          <span class="supply-label">MINTED</span>
          <span class="supply-val" id="sup-val">0 / 6969</span>
        </div>
        <div class="supply-track"><div class="supply-fill" id="sup-fill" style="width:0%"></div></div>
        <div class="supply-note" id="sup-note">GAME: 5 rounds · 3 lives · 600ms</div>
      </div>
      <div class="ctrl-row" style="margin-top:10px">
        <div class="ctrl-label">SIMULATE MINT %</div>
        <input type="range" id="ctrl-supply" min="0" max="100" value="0" oninput="onSupplyChange(this.value)">
      </div>
    </div>
    <div>
      <div class="ctrl-section-title">BACKGROUND</div>
      <div class="swatch-row" id="bg-swatches"></div>
    </div>
    <div>
      <div class="ctrl-section-title">BODY COLOR</div>
      <div class="swatch-row" id="body-swatches"></div>
    </div>
    <div>
      <div class="ctrl-section-title">RARITY BREAKDOWN</div>
      <div id="rarity-breakdown"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// LCG — exact port from JSX (mirrors Solidity)
// ═══════════════════════════════════════════════════════════════
function lcg(seed) {
  const rolls = [];
  let s = (seed * 6969 + 42) >>> 0;
  for (let i = 0; i < 7; i++) {
    s = ((s * 1664525 + 1013904223) >>> 0);
    rolls.push(s);
  }
  return rolls;
}

function pick(roll, weights) {
  const r = roll % 100;
  let c = 0;
  for (let i = 0; i < weights.length; i++) {
    c += weights[i];
    if (r < c) return i;
  }
  return weights.length - 1;
}

// ═══════════════════════════════════════════════════════════════
// TRAITS — exact from JSX, nothing added
// ═══════════════════════════════════════════════════════════════
const W_BG        = [22,20,18,15,12,8,3,2];      // 8 options, sum=100
const W_BODY      = [28,24,18,14,10,1,5];         // 7 options, sum=100
const W_ANTENNA   = [40,30,20,10];                // 4 options, sum=100
const W_EYES      = [35,28,20,12,5];              // 5 options, sum=100
const W_LEGS      = [55,30,15];                   // 3 options, sum=100
const W_SHELL     = [35,28,20,12,5];              // 5 options, sum=100
const W_ACCESSORY = [90,5,5];                     // 3 options, sum=100

const BG_NAMES    = ["Void","Sewer","Dirt","Rust","Lab","Neon Night","Gold","Glitch"];
const BODY_NAMES  = ["Brown","Dark","Albino","Green","Blue","Red","Gold"];
const ANT_NAMES   = ["Straight","Curly","Broken","Long"];
const EYE_NAMES   = ["Beady","Big","Angry","Dead","Laser"];
const LEG_NAMES   = ["6 Legs","4 Legs","8 Legs"];
const SHELL_NAMES = ["Smooth","Ridged","Spotted","Cracked","Glowing"];
const ACC_NAMES   = ["None","Wings","Crown"];

const RARE_TRAITS = ["Gold","Wings","Crown","Laser","Neon Night","Glitch"];

// Rarity as fraction (for breakdown bars)
const R_BG        = W_BG.map(w => w/100);
const R_BODY      = W_BODY.map(w => w/100);
const R_ANTENNA   = W_ANTENNA.map(w => w/100);
const R_EYES      = W_EYES.map(w => w/100);
const R_LEGS      = W_LEGS.map(w => w/100);
const R_SHELL     = W_SHELL.map(w => w/100);
const R_ACCESSORY = W_ACCESSORY.map(w => w/100);

// ═══════════════════════════════════════════════════════════════
// COLORS — exact from JSX
// ═══════════════════════════════════════════════════════════════
const BODY_COLOR = ["#6b4423","#2e1a0e","#d4b896","#3a5e28","#1e3a5e","#5e1e1e","#8a6a00"];
const BODY_SHADE = ["#3d2610","#1a0e06","#a08060","#223818","#122238","#381212","#5c4400"];
const BG_COLOR   = ["#080808","#0f1a0f","#1a1208","#1a0c08","#080f1a","#06000f","#1a1400","#000f08"];

function getTraits(seed) {
  const r = lcg(seed);
  return {
    bg:        pick(r[0], W_BG),
    body:      pick(r[1], W_BODY),
    antenna:   pick(r[2], W_ANTENNA),
    eyes:      pick(r[3], W_EYES),
    legs:      pick(r[4], W_LEGS),
    shell:     pick(r[5], W_SHELL),
    accessory: pick(r[6], W_ACCESSORY),
  };
}

// ═══════════════════════════════════════════════════════════════
// buildPixels — exact copy from JSX, zero changes
// ═══════════════════════════════════════════════════════════════
const GRID = 24;

function buildPixels(t) {
  const grid = Array.from({length: GRID}, () => Array(GRID).fill(null));
  const bc = BODY_COLOR[t.body];
  const bs = BODY_SHADE[t.body];

  function row(c1, c2, r, color) { for (let c = c1; c <= c2; c++) grid[r][c] = color; }
  function p(c, r, color) { if (r >= 0 && r < GRID && c >= 0 && c < GRID) grid[r][c] = color; }

  // Background
  const bgc = BG_COLOR[t.bg];
  for (let r = 0; r < GRID; r++) for (let c = 0; c < GRID; c++) grid[r][c] = bgc;

  // BG textures
  if (t.bg === 1) {
    [[3,0],[3,1],[3,2],[9,0],[9,1],[16,0],[16,1],[16,2],[16,3],[21,0],[21,1]].forEach(([c,r]) => p(c,r,"#1a3a1a"));
  }
  if (t.bg === 3) { [5,12,18].forEach(r => row(0,23,r,"#2a1008")); }
  if (t.bg === 5) { for (let r = 0; r < 24; r+=4) for (let c = 0; c < 24; c+=4) p(c,r,"#0a1a00"); }
  if (t.bg === 6) { for (let i = 0; i < 24; i++) p(i,i,"#2a2000"); }
  if (t.bg === 7) {
    row(0,23,4,"#001a0a"); row(0,15,11,"#001a0a");
    row(5,23,16,"#1a0005"); row(0,23,20,"#001a0a");
  }

  // Wings (behind body)
  if (t.accessory === 1) {
    const wL = [[6,9],[5,9],[4,9],[6,10],[5,10],[4,10],[3,10],[6,11],[5,11],[4,11],[3,11],[2,11],[6,12],[5,12],[4,12],[3,12],[6,13],[5,13]];
    const wR = [[17,9],[18,9],[19,9],[17,10],[18,10],[19,10],[20,10],[17,11],[18,11],[19,11],[20,11],[21,11],[17,12],[18,12],[19,12],[20,12],[17,13],[18,13]];
    const wc = [[5,10],[4,11],[5,11],[18,10],[19,11],[18,11]];
    wL.forEach(([c,r]) => p(c,r,"#a0cc44"));
    wR.forEach(([c,r]) => p(c,r,"#a0cc44"));
    wc.forEach(([c,r]) => p(c,r,"#b0dd55"));
    [[4,9],[3,10],[2,11],[3,12],[19,9],[20,10],[21,11],[20,12]].forEach(([c,r]) => p(c,r,"#88aa33"));
    [[6,13],[5,13],[17,13],[18,13]].forEach(([c,r]) => p(c,r,"#88aa33"));
  }

  // Legs
  const legRows6 = [10,12,14,16,18,20];
  const legRows4 = [10,13];
  const legRows8 = [9,11,13,15,16,17,18,19];
  const legSet = t.legs === 1 ? legRows4 : t.legs === 2 ? legRows8 : legRows6;
  const count  = t.legs === 1 ? 2 : t.legs === 2 ? 4 : 3;
  for (let i = 0; i < count; i++) {
    const r = legSet[i];
    p(6,r,bc); p(5,r,bc); p(4,r+1,bc);
    p(17,r,bc); p(18,r,bc); p(19,r+1,bc);
  }

  // Body
  row(9,14,8,bc);
  row(8,15,9,bc);
  row(7,16,10,bc);
  for (let r = 11; r <= 18; r++) { row(7,16,r,bc); p(7,r,bs); p(16,r,bs); }
  row(8,15,19,bc);
  row(9,14,20,bc);
  row(10,13,21,bc);

  // Shell
  if (t.shell === 1) { [10,13,16,19].forEach(r => row(8,15,r,bs)); }
  if (t.shell === 2) { [[9,10],[12,11],[10,13],[14,13],[11,15],[9,17],[13,17],[11,19]].forEach(([c,r]) => p(c,r,bs)); }
  if (t.shell === 3) {
    [[11,9],[12,10],[11,11],[12,12],[11,13],[12,14],[11,15],[12,16],[11,17],[12,18],[11,19]].forEach(([c,r]) => p(c,r,bs));
  }
  if (t.shell === 4) {
    row(9,14,8,"#c8ff00"); row(9,14,21,"#c8ff00");
    [10,14,18].forEach(r => { p(7,r,"#c8ff00"); p(16,r,"#c8ff00"); });
  }

  // Head
  row(10,13,4,bc);
  row(9,14,5,bc); p(9,5,bs); p(14,5,bs);
  row(9,14,6,bc); p(9,6,bs); p(14,6,bs);
  row(9,14,7,bc);
  p(8,8,bs); p(9,8,bc); row(10,13,8,bc); p(14,8,bc); p(15,8,bs);

  // Eyes
  if (t.eyes === 0) { p(10,6,"#0a0a0a"); p(13,6,"#0a0a0a"); }
  if (t.eyes === 1) {
    p(10,5,"#fff"); p(11,5,"#fff"); p(10,6,"#0a0a0a"); p(11,6,"#fff");
    p(13,5,"#fff"); p(14,5,"#fff"); p(13,6,"#0a0a0a"); p(14,6,"#fff");
  }
  if (t.eyes === 2) { p(10,5,"#0a0a0a"); p(13,5,"#0a0a0a"); p(10,6,"#cc2200"); p(13,6,"#cc2200"); }
  if (t.eyes === 3) {
    p(10,5,"#666"); p(11,6,"#666"); p(11,5,"#666"); p(10,6,"#666");
    p(13,5,"#666"); p(14,6,"#666"); p(14,5,"#666"); p(13,6,"#666");
  }
  if (t.eyes === 4) {
    p(10,6,"#ff3300"); p(13,6,"#ff3300");
    p(5,6,"#ff3300"); p(6,6,"#ff5500"); p(17,6,"#ff5500"); p(18,6,"#ff3300");
  }

  // Antenna
  if (t.antenna === 0) { p(10,3,bs); p(10,2,bs); p(10,1,"#fff"); p(13,3,bs); p(13,2,bs); p(13,1,"#fff"); }
  if (t.antenna === 1) {
    p(10,3,bs); p(10,2,bs); p(9,2,bs); p(8,2,bs); p(8,1,"#fff");
    p(13,3,bs); p(13,2,bs); p(14,2,bs); p(15,2,bs); p(15,1,"#fff");
  }
  if (t.antenna === 2) { p(10,3,bs); p(10,2,bs); p(9,1,bs); p(13,3,bs); p(13,2,bs); p(14,1,bs); }
  if (t.antenna === 3) {
    p(10,3,bs); p(10,2,bs); p(10,1,bs); p(10,0,"#fff");
    p(13,3,bs); p(13,2,bs); p(13,1,bs); p(13,0,"#fff");
  }

  // Crown
  if (t.accessory === 2) {
    row(9,14,3,"#ffd700");
    p(9,2,"#ffd700"); p(11,1,"#ffd700"); p(12,1,"#ffd700"); p(14,2,"#ffd700");
    p(9,2,"#ff4500"); p(12,1,"#ff4500"); p(14,2,"#ff4500");
  }

  // Gold body ring
  if (t.body === 6) {
    p(6,9,"#ffd700"); p(6,14,"#ffd700"); p(6,18,"#ffd700");
    p(17,9,"#ffd700"); p(17,14,"#ffd700"); p(17,18,"#ffd700");
    row(9,14,7,"#ffd700"); row(9,14,22,"#ffd700");
  }

  return grid;
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function drawPixelRoach(canvas, traits) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cell = Math.floor(Math.min(W, H) / GRID);
  const offX = Math.floor((W - cell * GRID) / 2);
  const offY = Math.floor((H - cell * GRID) / 2);
  ctx.fillStyle = BG_COLOR[traits.bg];
  ctx.fillRect(0, 0, W, H);
  const pixels = buildPixels(traits);
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      const color = pixels[r][c];
      if (color) { ctx.fillStyle = color; ctx.fillRect(offX + c*cell, offY + r*cell, cell, cell); }
    }
  }
}

function drawBanner(canvas, focusSeed) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const titleH = Math.round(H * 0.28);
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, W, titleH);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff4500';
  ctx.font = `900 ${Math.round(titleH * 0.42)}px Unbounded, sans-serif`;
  ctx.fillText('ONCHAIN ROACHES', W/2, Math.round(titleH * 0.64));
  ctx.fillStyle = 'rgba(200,255,0,0.5)';
  ctx.font = `${Math.round(titleH * 0.18)}px Space Mono, monospace`;
  ctx.fillText('FULLY ONCHAIN · 6969 · ETHEREUM', W/2, Math.round(titleH * 0.88));

  const bodyH = H - titleH;
  const cell  = Math.floor(bodyH / GRID);
  const roachW = cell * GRID;
  const count  = Math.floor(W / roachW);
  const slotW  = Math.floor(W / count);

  const seeds = Array.from({length: count}, (_, i) => {
    const base = focusSeed + (i - Math.floor(count/2)) * Math.max(1, Math.floor(6969/count));
    return Math.min(6969, Math.max(1, base));
  });

  seeds.forEach((seed, i) => {
    const t = { ...getTraits(seed), bg: i % 8 };
    const pixels = buildPixels(t);
    const destX  = i * slotW + Math.floor((slotW - roachW) / 2);
    ctx.fillStyle = BG_COLOR[t.bg];
    ctx.fillRect(destX, titleH, roachW, bodyH);
    for (let r = 0; r < GRID; r++) {
      for (let c = 0; c < GRID; c++) {
        const color = pixels[r][c];
        if (color) { ctx.fillStyle = color; ctx.fillRect(destX + c*cell, titleH + r*cell, cell, cell); }
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// RARITY
// ═══════════════════════════════════════════════════════════════
function rarityScore(t) {
  return 1/R_BG[t.bg] + 1/R_BODY[t.body] + 1/R_ANTENNA[t.antenna] +
         1/R_EYES[t.eyes] + 1/R_LEGS[t.legs] + 1/R_SHELL[t.shell] + 1/R_ACCESSORY[t.accessory];
}
function rarityTier(score) {
  if (score > 220) return 'LEGENDARY';
  if (score > 130) return 'EPIC';
  if (score > 75)  return 'RARE';
  if (score > 45)  return 'UNCOMMON';
  return 'COMMON';
}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let currentSeed = 1;
let currentView = 'pfp';
let traitOverrides = {};

function getEffectiveTraits(seed) { return { ...getTraits(seed), ...traitOverrides }; }

function render(seed) {
  currentSeed    = seed;
  traitOverrides = {};
  const t = getEffectiveTraits(seed);

  drawPixelRoach(document.getElementById('pfp-canvas'), t);
  drawBanner(document.getElementById('banner-canvas'), seed);

  const score = rarityScore(t);
  const tier  = rarityTier(score);
  const badge = document.getElementById('rarity-badge');
  badge.textContent = tier;
  badge.className   = `rarity-badge rarity-${tier}`;
  document.getElementById('rarity-score').textContent = `Rarity score: ${Math.round(score)}`;
  document.getElementById('token-id').textContent     = `TOKEN #${seed}`;

  const tg = document.getElementById('traits-grid');
  tg.innerHTML = '';
  const list = [
    ['BG',    BG_NAMES[t.bg],          R_BG[t.bg]],
    ['BODY',  BODY_NAMES[t.body],      R_BODY[t.body]],
    ['ANT',   ANT_NAMES[t.antenna],    R_ANTENNA[t.antenna]],
    ['EYES',  EYE_NAMES[t.eyes],       R_EYES[t.eyes]],
    ['LEGS',  LEG_NAMES[t.legs],       R_LEGS[t.legs]],
    ['SHELL', SHELL_NAMES[t.shell],    R_SHELL[t.shell]],
    ['ACC',   ACC_NAMES[t.accessory],  R_ACCESSORY[t.accessory]],
  ];
  for (const [label, val] of list) {
    const div = document.createElement('div');
    div.className = 'trait-pill' + (RARE_TRAITS.includes(val) ? ' rare-trait' : '');
    div.innerHTML = `<b>${label}</b>${val}`;
    tg.appendChild(div);
  }

  document.getElementById('rarity-breakdown').innerHTML = list.map(([label,, r]) => `
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:9px;letter-spacing:1px;color:var(--muted);width:46px">${label}</span>
      <div style="flex:1;height:2px;background:#1e1e1e">
        <div style="width:${r*100}%;height:100%;background:${r<0.1?'#c8ff00':r<0.2?'#818cf8':'#444'}"></div>
      </div>
      <span style="font-size:9px;color:${r<0.06?'#c8ff00':r<0.1?'#818cf8':'var(--muted)'};">${(r*100).toFixed(0)}%</span>
    </div>
  `).join('');
}

function setView(v) {
  currentView = v;
  document.getElementById('pfp-canvas').className    = v==='pfp'    ? 'show' : '';
  document.getElementById('banner-canvas').className = v==='banner' ? 'show' : '';
  document.querySelectorAll('.view-tab').forEach((tab,i) => {
    tab.classList.toggle('active', (i===0&&v==='pfp')||(i===1&&v==='banner'));
  });
}

function randomize() {
  const s = 1 + Math.floor(Math.random() * 6969);
  document.getElementById('ctrl-seed').value = s;
  document.getElementById('ctrl-seed-val').textContent = s;
  render(s);
}

function onSeedChange(v) {
  const s = parseInt(v);
  document.getElementById('ctrl-seed-val').textContent = s;
  render(s);
}

function onSupplyChange(v) {
  const pct    = parseInt(v);
  const minted = Math.round(pct/100*6969);
  document.getElementById('sup-val').textContent  = `${minted.toLocaleString()} / 6969`;
  document.getElementById('sup-fill').style.width = pct+'%';
  let rounds, lives, speed, note;
  if      (pct < 25) { rounds=5; lives=3; speed=600; note='EASY — early minters win'; }
  else if (pct < 50) { rounds=6; lives=2; speed=450; note='MEDIUM — getting harder'; }
  else if (pct < 75) { rounds=7; lives=2; speed=320; note='HARD — halfway pain'; }
  else if (pct < 90) { rounds=8; lives=1; speed=220; note='BRUTAL — 1 life'; }
  else               { rounds=9; lives=1; speed=150; note='NO MERCY — final stretch'; }
  document.getElementById('sup-note').textContent =
    `GAME: ${rounds} rounds · ${lives} ${lives===1?'life':'lives'} · ${speed}ms flash`;
}

function downloadPFP() {
  const a = document.createElement('a');
  a.download = `onchain-roach-${currentSeed}-pfp.png`;
  a.href = document.getElementById('pfp-canvas').toDataURL();
  a.click();
}
function downloadBanner() {
  const a = document.createElement('a');
  a.download = `onchain-roaches-banner.png`;
  a.href = document.getElementById('banner-canvas').toDataURL();
  a.click();
}

// ── SWATCHES ──
function buildSwatches() {
  const bgEl   = document.getElementById('bg-swatches');
  const bodyEl = document.getElementById('body-swatches');

  BG_COLOR.forEach((color, i) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (i===0?' active':'');
    s.style.background = color; s.title = BG_NAMES[i];
    s.onclick = () => {
      traitOverrides.bg = i;
      drawPixelRoach(document.getElementById('pfp-canvas'), getEffectiveTraits(currentSeed));
      bgEl.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
    };
    bgEl.appendChild(s);
  });

  BODY_COLOR.forEach((color, i) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (i===0?' active':'');
    s.style.background = color; s.title = BODY_NAMES[i];
    s.onclick = () => {
      traitOverrides.body = i;
      drawPixelRoach(document.getElementById('pfp-canvas'), getEffectiveTraits(currentSeed));
      bodyEl.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
    };
    bodyEl.appendChild(s);
  });
}

// ── GALLERY ──
function buildGallery() {
  const el    = document.getElementById('gallery');
  const seeds = [1,42,137,420,777,1337,2048,3333,4200,5555,6000,6420,6699,6900,6969];
  for (const seed of seeds) {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    const c = document.createElement('canvas');
    c.width = 72; c.height = 72;
    drawPixelRoach(c, getTraits(seed));
    const num = document.createElement('div');
    num.className = 'gnum'; num.textContent = '#'+seed;
    item.appendChild(c); item.appendChild(num);
    item.onclick = () => {
      document.getElementById('ctrl-seed').value = seed;
      document.getElementById('ctrl-seed-val').textContent = seed;
      render(seed);
    };
    el.appendChild(item);
  }
}

buildSwatches();
buildGallery();
render(1);
</script>
</body>
</html>
